<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jared Pinson</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Georgia', serif;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    a {
      color: #a0a0a0;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid #444;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    a:hover {
      color: #f0f0f0;
      border-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Jared Pinson</h1>
    <a href="https://linkedin.com/in/jared-pinson-sales" target="_blank" rel="noopener">LinkedIn</a>
  </div>
</body>
</html>
